<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background -->
  <rect width="100" height="100" fill="#0f1115" rx="12" />
  
  <!-- Outer Glow / Accent Border -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#2962ff" stroke-width="1.5" stroke-dasharray="4 2" />
  <rect x="12" y="12" width="76" height="76" fill="none" stroke="#ff5722" stroke-width="0.5" opacity="0.5" />
  
  <!-- Architectural Column / Wireframe -->
  <g fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linejoin="bevel">
    <!-- Base -->
    <path d="M 25 80 L 75 80 L 70 70 L 30 70 Z" fill="#1e293b" />
    
    <!-- Central Pillars -->
    <path d="M 35 70 L 35 30 M 50 70 L 50 20 M 65 70 L 65 30" stroke="#ff5722" stroke-width="3" />
    
    <!-- Cross Bracing (Truss) -->
    <path d="M 35 60 L 50 45 L 65 60 M 35 45 L 50 60 L 65 45 M 50 45 L 50 20" stroke="#2962ff" stroke-width="1" opacity="0.8" />
    
    <!-- Capital / Roof -->
    <path d="M 20 30 L 80 30 L 75 20 L 25 20 Z" fill="#1e293b" />
    <path d="M 45 20 L 50 10 L 55 20 Z" fill="#ff5722" />
  </g>
  
  <!-- Grid Dots -->
  <circle cx="20" cy="20" r="1.5" fill="#2962ff" />
  <circle cx="80" cy="20" r="1.5" fill="#2962ff" />
  <circle cx="20" cy="80" r="1.5" fill="#2962ff" />
  <circle cx="80" cy="80" r="1.5" fill="#2962ff" />
</svg>
